name: Schedule heartbeat

on:
  workflow_dispatch:
  schedule:
    - cron: "4,9,14,19,24,29,34,39,44,49,54,59 * * * *"

permissions:
  contents: read

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - name: Print schedule heartbeat
        run: |
          echo "Heartbeat UTC: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          echo "Event: ${{ github.event_name }}"
          echo "Workflow ref: ${{ github.workflow_ref }}"
          echo "SHA: ${{ github.sha }}"
